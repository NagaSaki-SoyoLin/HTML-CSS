<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单项标签</title>
</head>
<body>
    <!-- value: 表单项提交的值 -->
     <!-- 
        表单项标签：
        1. 文本框: <input type="text" name="name">
        2. 密码框: <input type="password" name="password">
        3. 单选框: <input type="radio" name="gender" value="1">
        4. 复选框: <input type="checkbox" name="hobby" value="java">
        5. 文件上传: <input type="file" name="image">
        6. 日期选择: <input type="date" name="birthday">
        7. 时间选择: <input type="time" name="time">
        8. 日期时间选择: <input type="datetime-local" name="datetime">
        9. 下拉框: <select name="degree">
            <option value="">请选择</option>
            <option value="1">小学</option>
            <option value="2">中学</option>
            <option value="3">大学</option>
            <option value="4">研究生及以上</option>
        10. 文本域: <textarea name="description" cols="30" rows="10"></textarea>
        11. 隐藏域: <input type="hidden" name="id" value="1">
        12. 表单常见按钮:
            <input type="button" value="按钮">
            <input type="reset" value="重置">
            <input type="submit" value="提交">
        
        label标签：
            1. label标签可以为表单项提供描述信息
            2. label标签可以通过for属性关联表单项的id属性，点击label标签时会触发表单项的选中状态
            3. label标签也可以直接包裹表单项，点击label标签时也会触发表单项的选中状态
     -->
    <form action="/save" method="post">
        <label>姓名: <input type="text" name="name"></label>
        <br><br>

        <label>密码: <input type="password" name="password"></label>
        <br><br>

        <div>性别:
            <label><input type="radio" name="gender" value="1"> 男</label>
            <label><input type="radio" name="gender" value="2"> 女</label>
        </div>
        <br>

        <div>爱好:
            <label><input type="checkbox" name="hobby" value="java"> java</label>
            <label><input type="checkbox" name="hobby" value="game"> game</label>
            <label><input type="checkbox" name="hobby" value="sing"> sing</label>
        </div>
        <br>

        <label>上传文件: <input type="file" name="image"></label>
        <br><br>

        <label>生日: <input type="date" name="birthday"></label>
        <br><br>

        <label>时间: <input type="time" name="time"></label>
        <br><br>

        <label>日期时间: <input type="datetime-local" name="datetime"></label>
        <br><br>

        <label>学历:
            <select name="degree">
                <option value="">请选择</option>
                <option value="1">小学</option>
                <option value="2">中学</option>
                <option value="3">大学</option>
                <option value="4">研究生及以上</option>
            </select>
        </label>
        <br><br>

        <label>描述:<br>
            <textarea name="description" cols="30" rows="10"></textarea>
        </label>
        <br><br>

        <input type="hidden" name="id" value="1">

        <!-- 表单常见按钮 -->
        <input type="button" value="按钮">
        <input type="reset" value="重置">
        <input type="submit" value="提交">
    </form>
</body>
</html>
