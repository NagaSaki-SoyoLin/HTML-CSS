<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex弹性布局</title>
    <style>
        /* body{
            margin: 0;
        } */

        #container {
            background-color: #f1eeee; /* 容器背景色 */
            width: 500px; /* 容器宽度 */
            height: 300px; /* 容器高度 */

            display: flex; /* 设置为flex弹性布局 */
            flex-direction: row; /* 默认row水平布局, 设置主轴 */

            /*
                flex_start 从头开始排列
                flex_end 从尾开始排列
                center 在主轴上居中排列
                space_around 平分剩余空间
                space_between 先两边贴边, 再中间平均分布
             */
            justify-content: space-between;
        }

        .item {
            background-color: rgb(184, 246, 184); /* 子元素背景色 */
            border: 1px solid rgb(141, 138, 138); /* 子元素边框颜色 */
            width: 100px; /* 子元素宽度 */
            height: 50px; /* 子元素高度 */
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="item">1</div>
        <div class="item">2</div>  
        <div class="item">3</div>
    </div>
</body>
</html>
